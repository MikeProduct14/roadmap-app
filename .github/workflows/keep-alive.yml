name: Keep Supabase Alive

on:
  schedule:
    # Каждые 3 дня в 8:00 UTC (11:00 МСК)
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Позволяет запустить вручную

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase to keep it alive..."
          curl -X GET \
            "https://giawwwkckdwsyvujbgjm.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            --fail-with-body \
            --silent \
            --show-error
          echo "✅ Ping successful!"
      
      - name: Ping profiles table
        run: |
          echo "Checking profiles table..."
          curl -X GET \
            "https://giawwwkckdwsyvujbgjm.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            --fail-with-body \
            --silent \
            --show-error
          echo "✅ Profiles table check successful!"
      
      - name: Report status
        if: always()
        run: |
          echo "Keep-alive ping completed at $(date)"
          echo "Next scheduled run: in 3 days"
